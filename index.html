<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nesza stuff</title>
    <link rel="icon" type="image/png" href="images/scythe.png">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <audio id="bg-music" loop>
        <source src="audio/og%20pila%20-%20bluetooth.mp3" type="audio/mpeg">
    </audio>
</head>
<body>
    <!-- GIF Background -->
    <div class="gif-bg"></div>

    <div id="loader-container" class="active">
        <div class="loader"></div>
    </div>

    <div id="enter-overlay" class="hidden">
        <div class="enter-text">Click to continue</div>
    </div>

    <div id="content" class="hidden blurry">
        <!-- Top-left name -->
        <h1 class="name">nesza</h1>

        <!-- Floating social cards -->
        <div class="cards-area">
            <!-- Live Discord Profile Card (clickable) -->
            <a href="https://discord.com/users/nesza" target="_blank" class="card card-profile" id="discord-profile">
                <div class="profile-header">
                    <div class="avatar-wrapper">
                        <img id="discord-avatar" src="images/discord.png" alt="Avatar" class="profile-avatar">
                        <div id="status-dot" class="status-dot offline"></div>
                    </div>
                    <div class="profile-info">
                        <div class="profile-username" id="discord-username">Loading...</div>
                        <div class="profile-status-text" id="discord-status">connecting...</div>
                    </div>
                </div>
                <div class="profile-activity" id="discord-activity">
                </div>
            </a>

            <!-- Telegram Card -->
            <a href="https://t.me/nesza_12" target="_blank" class="card card-telegram">
                <img src="images/telegram.png" alt="Telegram">
                <span>telegram</span>
            </a>
        </div>

        <!-- Music Player -->
        <div class="container">
            <header>
            </header>
            <main>
                <div class="album-art">
                    <img src="images/monkey.jpg" alt="Album Art" />
                </div>
                <div class="player">
                    <i class="fa fa-repeat" id="restart-btn"></i>
                    <i class="fa fa-fast-backward" id="rewind-btn"></i>
                    <i class="fa fa-play" id="play-btn"></i>
                    <i class="fa fa-fast-forward" id="forward-btn"></i>
                </div>
            </main>
            <footer>
                <div class="title">op pila - bluetooth</div>
                <div class="time-tracker">
                    <div class="timer">
                        <div class="bg"></div>
                    </div>
                    <div class="time">00:00</div>
                </div>
            </footer>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
